name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      AI_ENGINE_API_KEY: ci-test-key
      DB_FILE: ci_engine_data.db
      MEDIAPIPE_WORKERS: "1"
      CORS_ALLOWED_ORIGINS: http://127.0.0.1:8000,http://localhost:8000
      CORS_ALLOW_CREDENTIALS: "0"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile source
        run: python -m compileall -q .

      - name: Smoke test public numeric flow
        run: |
          python - <<'PY'
          from db.database import init_db
          from core.synthetic import generate_synthetic_face
          from core.scoring import get_centralized_model, predict_score
          from core.training import train_centralized_model_transactional

          init_db()
          features = generate_synthetic_face()
          assert len(features) == 6
          assert all(0.0 <= float(value) <= 1.0 for value in features)

          weights, history_count, stats = get_centralized_model()
          score = predict_score(features, weights, stats)
          assert 1.0 <= float(score) <= 10.0

          _, mean, count = train_centralized_model_transactional(features, score, 7.0)
          assert 1.0 <= float(mean) <= 10.0
          assert int(count) >= 1
          PY
